<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Ensayo Tipo PAES</title>

<style>
:root {
    --primary: #2563eb;
    --background: #f3f4f6;
    --card: #ffffff;
    --text: #111827;
}

@media (prefers-color-scheme: dark) {
    :root {
        --background: #111827;
        --card: #1f2937;
        --text: #f3f4f6;
    }
}

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 30px;
    background: var(--background);
    color: var(--text);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

h2 {
    margin-top: 0;
}

.container {
    max-width: 1100px;
    margin: auto;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.inputs {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.input-group {
    flex: 1;
    min-width: 180px;
}

label {
    font-weight: 600;
    display: block;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 16px;
}

.resultados {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    font-size: 18px;
    font-weight: 600;
}

.table-container {
    max-height: 400px;
    overflow-y: auto;
    border-radius: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background-color: var(--primary);
    color: white;
    position: sticky;
    top: 0;
}

tr:nth-child(even) {
    background-color: rgba(0,0,0,0.05);
}

.explicacion p {
    margin-bottom: 10px;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">
<h1>Calculadora Ensayo Tipo PAES</h1>

<div class="card">
<div class="inputs">
<div class="input-group">
<label>Total preguntas</label>
<input type="number" id="total" value="50" min="1">
</div>

<div class="input-group">
<label>Correctas</label>
<input type="number" id="correctas" value="25" min="0">
</div>

<div class="input-group">
<label>Exigencia (%)</label>
<input type="number" id="exigencia" value="60" min="1" max="99">
</div>

<div class="input-group">
<label>Nota mínima</label>
<input type="number" id="notaMin" value="1.0" step="0.1">
</div>

<div class="input-group">
<label>Nota máxima</label>
<input type="number" id="notaMax" value="7.0" step="0.1">
</div>
</div>
</div>

<div class="card resultados">
<div>Porcentaje: <span id="porcentaje">0%</span></div>
<div>Puntaje PAES: <span id="paes">0</span></div>
<div>Nota: <span id="nota">1.0</span></div>
</div>

<div class="card table-container">
<table>
<thead>
<tr>
<th>Correctas</th>
<th>% Logro</th>
<th>Puntaje PAES</th>
<th>Nota</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="card explicacion">
<h2>¿Cómo se realizan los cálculos?</h2>
<p id="textoExplicacion"></p>
</div>

</div>

<script>
function calcularNota(p, exigencia, notaMin, notaMax) {
    if (p <= exigencia) {
        return notaMin + (4 - notaMin) * (p / exigencia);
    } else {
        return 4 + (notaMax - 4) * ((p - exigencia) / (1 - exigencia));
    }
}

function actualizar() {

let total = Math.max(1, parseInt(totalInput.value));
let correctas = Math.max(0, parseInt(correctasInput.value));
let exigencia = Math.min(99, Math.max(1, parseFloat(exigenciaInput.value))) / 100;
let notaMin = parseFloat(notaMinInput.value);
let notaMax = parseFloat(notaMaxInput.value);

if (correctas > total) correctas = total;
if (notaMin >= 4) notaMin = 3.9;
if (notaMax <= 4) notaMax = 4.1;

let porcentaje = correctas / total;
let nota = calcularNota(porcentaje, exigencia, notaMin, notaMax);
let puntaje = 100 + 900 * porcentaje;

porcentajeSpan.textContent = (porcentaje * 100).toFixed(1) + "%";
notaSpan.textContent = nota.toFixed(1);
paesSpan.textContent = Math.round(puntaje);

generarTabla(total, exigencia, notaMin, notaMax);
generarExplicacion(total, correctas, porcentaje, exigencia, notaMin, notaMax, nota, puntaje);

}

function generarTabla(total, exigencia, notaMin, notaMax) {
tabla.innerHTML = "";
for (let i = 0; i <= total; i++) {
let p = i / total;
let nota = calcularNota(p, exigencia, notaMin, notaMax);
let puntaje = 100 + 900 * p;
tabla.innerHTML += `
<tr>
<td>${i}</td>
<td>${(p*100).toFixed(1)}%</td>
<td>${Math.round(puntaje)}</td>
<td>${nota.toFixed(1)}</td>
</tr>`;
}
}

function generarExplicacion(total, correctas, porcentaje, exigencia, notaMin, notaMax, nota, puntaje) {

let texto = `
Para calcular la nota, primero se obtiene el porcentaje de logro:
${correctas} / ${total} = ${(porcentaje*100).toFixed(1)}%.

La exigencia configurada es ${(exigencia*100).toFixed(0)}%, lo que significa que ese porcentaje corresponde a nota 4,0.

Si el porcentaje es menor o igual a la exigencia, la nota se calcula proporcionalmente entre ${notaMin} y 4,0.

Si el porcentaje supera la exigencia, la nota se distribuye proporcionalmente entre 4,0 y ${notaMax}.

En este caso, la nota final obtenida es ${nota.toFixed(1)}.

El puntaje tipo PAES se calcula mediante una transformación lineal:

100 + 900 × porcentaje_logro

Por lo tanto:
100 + 900 × ${(porcentaje).toFixed(3)} = ${Math.round(puntaje)} puntos.
`;

document.getElementById("textoExplicacion").textContent = texto;

}

const totalInput = document.getElementById("total");
const correctasInput = document.getElementById("correctas");
const exigenciaInput = document.getElementById("exigencia");
const notaMinInput = document.getElementById("notaMin");
const notaMaxInput = document.getElementById("notaMax");

const porcentajeSpan = document.getElementById("porcentaje");
const paesSpan = document.getElementById("paes");
const notaSpan = document.getElementById("nota");
const tabla = document.getElementById("tabla");

document.querySelectorAll("input").forEach(i => {
i.addEventListener("input", actualizar);
});

actualizar();
</script>

</body>
</html>
